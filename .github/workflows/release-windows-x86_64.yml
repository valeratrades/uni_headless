env:
  CARGO_INCREMENTAL: '0'
  CARGO_NET_RETRY: '10'
  RUSTUP_MAX_RETRIES: '10'
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Fetch tags
      run: git fetch --tags --no-recurse-submodules
    - uses: dtolnay/rust-toolchain@nightly
      with:
        targets: x86_64-pc-windows-msvc
    - name: Remove .cargo/config.toml
      run: Remove-Item -Force -ErrorAction SilentlyContinue .cargo/config.toml, .cargo/config
      shell: pwsh
    - name: Build release binary
      run: cargo build --release --target x86_64-pc-windows-msvc --no-default-features
    - name: Package binary
      run: 'cd target/x86_64-pc-windows-msvc/release

        $PNAME = $env:GITHUB_REPOSITORY.Split(''/'')[-1]

        Compress-Archive -Path "$PNAME.exe" -DestinationPath "../../../$PNAME-x86_64-pc-windows-msvc.zip"

        '
      shell: pwsh
    - id: version
      name: Resolve version tag
      run: "if [[ \"${{ github.ref_type }}\" == \"tag\" ]]; then\n  echo \"tag=${{\
        \ github.ref_name }}\" >> \"$GITHUB_OUTPUT\"\nelse\n  LATEST=$(git tag -l\
        \ 'v[0-9]*' --sort=-v:refname | head -1)\n  if [[ -n \"$LATEST\" ]]; then\n\
        \    echo \"tag=$LATEST\" >> \"$GITHUB_OUTPUT\"\n  else\n    echo \"::notice::No\
        \ existing v* tags found, skipping versioned release\"\n    echo \"tag=\"\
        \ >> \"$GITHUB_OUTPUT\"\n  fi\nfi\n"
      shell: bash
    - env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      name: Release (latest)
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.event.repository.name }}-x86_64-pc-windows-msvc.zip
        make_latest: false
        name: Latest windows-x86_64
        prerelease: true
        tag_name: latest-windows-x86_64
    - env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: steps.version.outputs.tag != ''
      name: Release (versioned)
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ github.event.repository.name }}-x86_64-pc-windows-msvc.zip
        tag_name: ${{ steps.version.outputs.tag }}
name: Release windows-x86_64
'on':
  push:
    tags:
    - v[0-9]+.*
  workflow_dispatch: {}
permissions:
  contents: write
